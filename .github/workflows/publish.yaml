name: Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run validation checks
        run: pnpm validate:check

      - name: Run tests
        run: pnpm test

      # Pinned to 11.10.0: last version that bundles `promise-retry`, which
      # avoids the self-upgrade MODULE_NOT_FOUND regression when running over
      # Node 22.22.2's broken bundled npm 10.9.7.
      # Refs: actions/runner-images#13883, nodejs/node#62430, npm/cli#9152
      # Still satisfies the >=11.5.1 requirement for npm OIDC trusted publishing.
      - name: Update npm to a known-good 11.x
        run: npm install -g npm@11.10.0

      - name: Publish to npm
        run: npm publish --access public
